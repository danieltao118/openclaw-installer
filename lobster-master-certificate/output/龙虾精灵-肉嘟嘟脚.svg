<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lobster-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E55A2B"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
      
      @keyframes claw-move {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-5deg); }
        75% { transform: rotate(5deg); }
      }
      
      @keyframes foot-tap {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
      }
      
      .body-group {
        animation: pulse 2s ease-in-out infinite;
        transform-origin: 60px 55px;
      }
      
      .claw-left {
        animation: claw-move 3s ease-in-out infinite;
        transform-origin: 20px 45px;
      }
      
      .claw-right {
        animation: claw-move 3s ease-in-out infinite reverse;
        transform-origin: 100px 45px;
      }
      
      .foot-left {
        animation: foot-tap 2s ease-in-out infinite;
      }
      
      .foot-right {
        animation: foot-tap 2s ease-in-out infinite reverse;
      }
    </style>
  </defs>
  
  <!-- 主体组 -->
  <g class="body-group">
    <!-- 左螯 -->
    <g class="claw-left">
      <path d="M25 42 C12 38 8 46 12 54 C16 62 25 58 29 50 C31 44 29 42 25 42Z" 
            fill="url(#lobster-gradient)"/>
    </g>
    
    <!-- 右螯 -->
    <g class="claw-right">
      <path d="M95 42 C108 38 112 46 108 54 C104 62 95 58 91 50 C89 44 91 42 95 42Z" 
            fill="url(#lobster-gradient)"/>
    </g>
    
    <!-- 左脚 - 肉嘟嘟的小脚 -->
    <g class="foot-left">
      <!-- 脚主体 - 圆润椭圆 -->
      <ellipse cx="38" cy="95" rx="10" ry="8" fill="url(#lobster-gradient)"/>
      <!-- 脚底 - 扁平 -->
      <ellipse cx="38" cy="98" rx="10" ry="4" fill="#C73E1D"/>
      <!-- 脚趾 - 3个小圆点 -->
      <circle cx="33" cy="96" r="2" fill="#FF8C42"/>
      <circle cx="38" cy="97" r="2" fill="#FF8C42"/>
      <circle cx="43" cy="96" r="2" fill="#FF8C42"/>
    </g>
    
    <!-- 右脚 - 肉嘟嘟的小脚 -->
    <g class="foot-right">
      <!-- 脚主体 - 圆润椭圆 -->
      <ellipse cx="82" cy="95" rx="10" ry="8" fill="url(#lobster-gradient)"/>
      <!-- 脚底 - 扁平 -->
      <ellipse cx="82" cy="98" rx="10" ry="4" fill="#C73E1D"/>
      <!-- 脚趾 - 3个小圆点 -->
      <circle cx="77" cy="96" r="2" fill="#FF8C42"/>
      <circle cx="82" cy="97" r="2" fill="#FF8C42"/>
      <circle cx="87" cy="96" r="2" fill="#FF8C42"/>
    </g>
    
    <!-- 龙虾身体 -->
    <path d="M60 15 C35 15 22 35 22 52 C22 68 35 85 48 89 L48 92 L72 92 L72 89 C85 85 98 68 98 52 C98 35 85 15 60 15Z" 
          fill="url(#lobster-gradient)" filter="url(#glow)"/>
    
    <!-- 高光 -->
    <ellipse cx="48" cy="32" rx="12" ry="10" fill="rgba(255,255,255,0.35)"/>
    
    <!-- 触须 -->
    <path d="M48 18 Q40 10 36 12" stroke="#FF8C42" stroke-width="2" stroke-linecap="round"/>
    <path d="M72 18 Q80 10 84 12" stroke="#FF8C42" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 眼睛 -->
    <circle cx="48" cy="32" r="5" fill="#050810"/>
    <circle cx="72" cy="32" r="5" fill="#050810"/>
    <circle cx="49" cy="31" r="1.8" fill="#00e5cc"/>
    <circle cx="73" cy="31" r="1.8" fill="#00e5cc"/>
    
    <!-- 微笑 -->
    <path d="M 52 42 Q 60 47 68 42" fill="none" stroke="#050810" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 腮红 -->
    <ellipse cx="38" cy="36" rx="4" ry="2" fill="rgba(255,100,100,0.3)"/>
    <ellipse cx="82" cy="36" rx="4" ry="2" fill="rgba(255,100,100,0.3)"/>
  </g>
</svg>