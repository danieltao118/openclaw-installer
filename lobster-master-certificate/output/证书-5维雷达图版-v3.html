<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 794px;
      height: 1123px;
      background: #0A1628;
      font-family: "Inter", "SF Pro Display", sans-serif;
      position: relative;
      overflow: hidden;
    }
    
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.9;
    }
    
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 50px;
      z-index: 10;
    }
    
    .sprite-container {
      width: 70px;
      height: 70px;
      margin-bottom: 10px;
    }
    
    .title {
      font-size: 26px;
      font-weight: 800;
      color: #FF6B35;
      letter-spacing: 3px;
      margin-bottom: 4px;
      text-shadow: 0 0 15px rgba(255, 107, 53, 0.5);
    }
    
    .title-en {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 2px;
      margin-bottom: 15px;
    }
    
    .congrats {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 8px;
    }
    
    .name {
      font-size: 28px;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 12px;
      border-bottom: 2px solid #FF6B35;
      padding: 0 20px 6px;
    }
    
    .description {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.6;
      text-align: center;
      margin-bottom: 15px;
      font-weight: 500;
    }
    
    .radar-container {
      position: relative;
      width: 240px;
      height: 200px;
      margin-bottom: 15px;
    }
    
    .info-row {
      display: flex;
      gap: 25px;
      margin-bottom: 12px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }
    
    .info-item {
      text-align: center;
    }
    
    .info-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 10px;
      margin-bottom: 2px;
    }
    
    .info-value {
      color: #FFFFFF;
      font-weight: 600;
    }
    
    .honor {
      font-size: 14px;
      color: #FF6B35;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .wish {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      font-style: italic;
      margin-bottom: 15px;
    }
    
    .footer {
      text-align: center;
      margin-top: auto;
    }
    
    .footer-text {
      font-size: 13px;
      color: #FFFFFF;
      font-weight: 700;
    }
    
    .footer-sub {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .cert-no {
      position: absolute;
      bottom: 20px;
      right: 30px;
      font-size: 9px;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <img src="证书底图-即梦-v2.png" class="bg-image" alt="bg">
  
  <div class="content">
    <!-- 龙虾精灵 -->
    <div class="sprite-container">
      <svg viewBox="0 0 120 120" width="100%" height="100%">
        <defs>
          <radialGradient id="body-gradient" cx="40%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#FF8C42"/>
            <stop offset="40%" stop-color="#FF6B35"/>
            <stop offset="100%" stop-color="#E55A2B"/>
          </radialGradient>
          <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <path d="M18 38 C5 35 2 45 8 55 C14 65 22 58 26 48 C28 42 24 38 18 38Z" fill="url(#body-gradient)"/>
        <path d="M102 38 C115 35 118 45 112 55 C106 65 98 58 94 48 C92 42 96 38 102 38Z" fill="url(#body-gradient)"/>
        <circle cx="42" cy="98" r="7" fill="url(#body-gradient)"/>
        <circle cx="78" cy="98" r="7" fill="url(#body-gradient)"/>
        <circle cx="60" cy="55" r="42" fill="url(#body-gradient)" filter="url(#soft-glow)"/>
        <ellipse cx="48" cy="35" rx="12" ry="8" fill="rgba(255,255,255,0.25)"/>
        <path d="M45 18 Q38 10 35 12" stroke="#FF8C42" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M75 18 Q82 10 85 12" stroke="#FF8C42" stroke-width="2" stroke-linecap="round" fill="none"/>
        <circle cx="48" cy="48" r="5" fill="#4A3728"/>
        <circle cx="72" cy="48" r="5" fill="#4A3728"/>
        <circle cx="50" cy="46" r="2" fill="#FFD4A3"/>
        <circle cx="74" cy="46" r="2" fill="#FFD4A3"/>
        <path d="M 52 58 Q 60 64 68 58" fill="none" stroke="#4A3728" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="38" cy="55" rx="10" ry="6" fill="rgba(255,182,193,0.4)"/>
        <ellipse cx="82" cy="55" rx="10" ry="6" fill="rgba(255,182,193,0.4)"/>
      </svg>
    </div>
    
    <div class="title">龙虾驯养师认证</div>
    <div class="title-en">LOBSTER MASTER CERTIFICATE</div>
    
    <div class="congrats">恭喜伟大的</div>
    <div class="name">【学员姓名】</div>
    
    <div class="description">
      在3天AI教培实战营中<br>
      成功驯养一只强大的数字龙虾
    </div>
    
    <!-- 5维雷达图 - 缩小版 -->
