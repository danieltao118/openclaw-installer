<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 794px;
      height: 1123px;
      background: #0A1628;
      font-family: "Inter", "SF Pro Display", "Source Han Sans", sans-serif;
      position: relative;
      overflow: hidden;
    }
    
    /* 底图 */
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.9;
    }
    
    /* 内容层 */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 80px;
      z-index: 10;
    }
    
    /* 龙虾精灵 */
    .sprite-container {
      width: 120px;
      height: 120px;
      margin-bottom: 30px;
    }
    
    /* 主标题 */
    .title {
      font-size: 36px;
      font-weight: 800;
      color: #FF6B35;
      letter-spacing: 4px;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(255, 107, 53, 0.4);
    }
    
    /* 英文标题 */
    .title-en {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 3px;
      margin-bottom: 50px;
    }
    
    /* 恭喜文字 */
    .congrats {
      font-size: 20px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 30px;
      font-weight: 500;
    }
    
    /* 学员姓名 */
    .name {
      font-size: 42px;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 40px;
      border-bottom: 3px solid #FF6B35;
      padding: 0 40px 15px;
    }
    
    /* 描述文字 */
    .description {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.8;
      text-align: center;
      margin-bottom: 40px;
    }
    
    /* 能力值区域 */
    .abilities {
      background: rgba(255, 107, 53, 0.1);
      border-radius: 15px;
      padding: 25px 40px;
      margin-bottom: 30px;
      width: 100%;
      max-width: 500px;
    }
    
    .ability-item {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      font-size: 15px;
    }
    
    .ability-item:last-child {
      margin-bottom: 0;
    }
    
    .ability-label {
      width: 100px;
      text-align: left;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
    }
    
    .ability-bar {
      flex: 1;
      height: 18px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 9px;
      overflow: hidden;
      margin: 0 15px;
    }
    
    .ability-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF6B35, #FF8C42);
      border-radius: 9px;
    }
    
    .ability-value {
      width: 50px;
      text-align: right;
      color: #FF6B35;
      font-weight: 700;
    }
    
    /* 信息区 */
    .info {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 30px;
      text-align: center;
    }
    
    .info-item {
      display: inline-block;
      margin: 0 20px;
    }
    
    .info-label {
      color: rgba(255, 255, 255, 0.5);
    }
    
    .info-value {
      color: #FFFFFF;
      font-weight: 600;
    }
    
    /* 荣誉称号 */
    .honor {
      font-size: 18px;
      color: #FF6B35;
      font-weight: 700;
      margin-bottom: 15px;
    }
    
    /* 祝福语 */
    .wish {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.6);
      font-style: italic;
      margin-bottom: 30px;
    }
    
    /* 日期 */
    .date {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 30px;
    }
    
    /* 底部认证 */
    .footer {
      text-align: center;
    }
    
    .footer-text {
      font-size: 16px;
      color: #FFFFFF;
      font-weight: 700;
      margin-bottom: 5px;
    }
    
    .footer-sub {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    /* 证书编号 */
    .cert-no {
      position: absolute;
      bottom: 30px;
      right: 40px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <!-- 底图 -->
  <img src="证书底图-即梦-v2.png" class="bg-image" alt="bg">
  
  <!-- 内容 -->
  <div class="content">
    <!-- 龙虾精灵 -->
    <div class="sprite-container">
      <svg viewBox="0 0 120 120" width="100%" height="100%">
        <defs>
          <radialGradient id="body-gradient" cx="40%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#FF8C42"/>
            <stop offset="40%" stop-color="#FF6B35"/>
            <stop offset="100%" stop-color="#E55A2B"/>
          </radialGradient>
          <radialGradient id="blush-gradient" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFB6C1" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#FFB6C1" stop-opacity="0"/>
          </radialGradient>
          <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        
        <!-- 左大螯 -->
        <path d="M18 38 C5 35 2 45 8 55 C14 65 22 58 26 48 C28 42 24 38 18 38Z" fill="url(#body-gradient)"/>
        
        <!-- 右大螯 -->
        <path d="M102 38 C115 35 118 45 112 55 C106 65 98 58 94 48 C92 42 96 38 102 38Z" fill="url(#body-gradient)"/>
        
        <!-- 左脚 -->
        <circle cx="42" cy="98" r="7" fill="url(#body-gradient)"/>
        
        <!-- 右脚 -->
        <circle cx="78" cy="98" r="7" fill="url(#body-gradient)"/>
        
        <!-- 主身体 -->
        <circle cx="60" cy="55" r="42" fill="url(#body-gradient)" filter="url(#soft-glow)"/>
        
        <!-- 高光 -->
        <ellipse cx="48" cy="35" rx="12" ry="8" fill="rgba(255,255,255,0.25)"/>
        
        <!-- 触须 -->
        <path d="M45 18 Q38 10 35 12" stroke="#FF8C42" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M75 18 Q82 10 85 12" stroke="#FF8C42" stroke-width="2" stroke-linecap="round" fill="none"/>
        
        <!-- 眼睛 -->
        <circle cx="48" cy="48" r="5" fill="#4A3728"/>
        <circle cx="72" cy="48" r="5" fill="#4A3728"/>
        
        <!-- 眼睛高光 - 浅橙色 -->
        <circle cx="50" cy="46" r="2" fill="#FFD4A3"/>
        <circle cx="74" cy="46" r="2" fill="#FFD4A3"/>
        
        <!-- 微笑 -->
        <path d="M 52 58 Q 60 64 68 58" fill="none" stroke="#4A3728" stroke-width="2.5" stroke-linecap="round"/>
        
        <!-- 腮红 -->
        <ellipse cx="38" cy="55" rx="10" ry="6" fill="url(#blush-gradient)"/>
        <ellipse cx="82" cy="55" rx="10" ry="6" fill="url(#blush-gradient)"/>
      </svg>
    </div>
    
    <!-- 标题 -->
    <div class="title">龙虾驯养师认证</div>
    <div class="title-en">LOBSTER MASTER CERTIFICATE</div>
    
    <!-- 恭喜 -->
    <div class="congrats">恭喜伟大的</div>
    
    <!-- 姓名 -->
    <div class="name">【学员姓名】</div>
    
    <!-- 描述 -->
    <div class="description">
      已成功驯养一只强大的数字龙虾<br>
      具备独立喂养、训练、升级AI龙虾的能力
    </div>
    
    <!-- 能力值 -->
    <div class="abilities">
      <div class="ability-item">
        <span class="ability-label">虾的战斗力</span>
        <div class="ability-bar">
          <div class="ability-fill" style="width: 100%;"></div>
        </div>
        <span class="ability-value">100%</span>
      </div>
      <div class="ability-item">
        <span class="ability-label
