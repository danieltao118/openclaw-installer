<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 龙虾渐变 -->
    <linearGradient id="lobster-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E55A2B"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 动画 -->
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
      
      @keyframes claw-move {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-5deg); }
        75% { transform: rotate(5deg); }
      }
      
      @keyframes antenna-wiggle {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-3deg); }
        75% { transform: rotate(3deg); }
      }
      
      @keyframes eye-glow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      
      .body-group {
        animation: pulse 2s ease-in-out infinite;
        transform-origin: 60px 60px;
      }
      
      .claw-left {
        animation: claw-move 3s ease-in-out infinite;
        transform-origin: 20px 45px;
      }
      
      .claw-right {
        animation: claw-move 3s ease-in-out infinite reverse;
        transform-origin: 100px 45px;
      }
      
      .antenna-left {
        animation: antenna-wiggle 2s ease-in-out infinite;
        transform-origin: 45px 15px;
      }
      
      .antenna-right {
        animation: antenna-wiggle 2s ease-in-out infinite reverse;
        transform-origin: 75px 15px;
      }
      
      .eye-glow {
        animation: eye-glow 2s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- 主体组 -->
  <g class="body-group">
    <!-- 龙虾身体 -->
    <path d="M60 15 C35 15 22 35 22 52 C22 68 35 85 48 89 L48 97 L56 97 L56 89 C56 89 60 91 64 89 L64 97 L72 97 L72 89 C85 85 98 68 98 52 C98 35 85 15 60 15Z" 
          fill="url(#lobster-gradient)" filter="url(#glow)"/>
    
    <!-- 左螯 -->
    <g class="claw-left">
      <path d="M25 42 C12 38 8 46 12 54 C16 62 25 58 29 50 C31 44 29 42 25 42Z" 
            fill="url(#lobster-gradient)"/>
    </g>
    
    <!-- 右螯 -->
    <g class="claw-right">
      <path d="M95 42 C108 38 112 46 108 54 C104 62 95 58 91 50 C89 44 91 42 95 42Z" 
            fill="url(#lobster-gradient)"/>
    </g>
    
    <!-- 左触须 -->
    <g class="antenna-left">
      <path d="M48 20 Q40 12 36 14" stroke="#FF8C42" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    
    <!-- 右触须 -->
    <g class="antenna-right">
      <path d="M72 20 Q80 12 84 14" stroke="#FF8C42" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    
    <!-- 眼睛 -->
    <circle cx="48" cy="32" r="5" fill="#050810"/>
    <circle cx="72" cy="32" r="5" fill="#050810"/>
    
    <!-- 眼睛发光 -->
    <circle cx="49" cy="31" r="1.8" fill="#00e5cc" class="eye-glow"/>
    <circle cx="73" cy="31" r="1.8" fill="#00e5cc" class="eye-glow"/>
    
    <!-- 微笑 -->
    <path d="M 52 45 Q 60 50 68 45" fill="none" stroke="#050810" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 腮红 -->
    <ellipse cx="38" cy="38" rx="4" ry="2" fill="rgba(255,100,100,0.3)"/>
    <ellipse cx="82" cy="38" rx="4" ry="2" fill="rgba(255,100,100,0.3)"/>
  </g>
</svg>