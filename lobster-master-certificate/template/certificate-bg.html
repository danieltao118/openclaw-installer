<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 794px;
      height: 1123px;
      background: linear-gradient(135deg, #E8F4F8 0%, #F0F8FF 50%, #E8F4F8 100%);
      font-family: "Source Han Sans", "Microsoft YaHei", sans-serif;
      position: relative;
      overflow: hidden;
    }
    
    /* 边框装饰 */
    .border {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      border: 3px solid #FF6B35;
      border-radius: 20px;
    }
    
    .border-inner {
      position: absolute;
      top: 30px;
      left: 30px;
      right: 30px;
      bottom: 30px;
      border: 2px solid #003B5C;
      border-radius: 15px;
    }
    
    /* 气泡装饰 */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 107, 53, 0.1);
    }
    
    .bubble-1 { width: 60px; height: 60px; top: 80px; left: 60px; }
    .bubble-2 { width: 40px; height: 40px; top: 120px; left: 100px; }
    .bubble-3 { width: 50px; height: 50px; bottom: 100px; right: 80px; }
    .bubble-4 { width: 30px; height: 30px; bottom: 140px; right: 120px; }
    
    /* 角落装饰 - 龙虾爪 */
    .claw-decoration {
      position: absolute;
      width: 80px;
      height: 80px;
      opacity: 0.1;
    }
    
    .claw-top-left {
      top: 40px;
      left: 40px;
      background: radial-gradient(circle, #FF6B35 30%, transparent 70%);
      border-radius: 50%;
    }
    
    .claw-top-right {
      top: 40px;
      right: 40px;
      background: radial-gradient(circle, #FF6B35 30%, transparent 70%);
      border-radius: 50%;
    }
    
    .claw-bottom-left {
      bottom: 40px;
      left: 40px;
      background: radial-gradient(circle, #FF6B35 30%, transparent 70%);
      border-radius: 50%;
    }
    
    .claw-bottom-right {
      bottom: 40px;
      right: 40px;
      background: radial-gradient(circle, #FF6B35 30%, transparent 70%);
      border-radius: 50%;
    }
    
    /* 顶部装饰线 */
    .top-line {
      position: absolute;
      top: 100px;
      left: 100px;
      right: 100px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #FF6B35, transparent);
    }
    
    /* 底部装饰线 */
    .bottom-line {
      position: absolute;
      bottom: 150px;
      left: 100px;
      right: 100px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #FF6B35, transparent);
    }
    
    /* 波浪纹理背景 */
    .wave-pattern {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 107, 53, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 59, 92, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 107, 53, 0.02) 0%, transparent 70%);
    }
  </style>
</head>
<body>
  <div class="wave-pattern"></div>
  
  <div class="border"></div>
  <div class="border-inner"></div>
  
  <div class="bubble bubble-1"></div>
  <div class="bubble bubble-2"></div>
  <div class="bubble bubble-3"></div>
  <div class="bubble bubble-4"></div>
  
  <div class="claw-decoration claw-top-left"></div>
  <div class="claw-decoration claw-top-right"></div>
  <div class="claw-decoration claw-bottom-left"></div>
  <div class="claw-decoration claw-bottom-right"></div>
  
  <div class="top-line"></div>
  <div class="bottom-line"></div>
</body>
</html>
