name: 构建 macOS 安装器

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ===== 第一步: 测试 =====
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS M芯片
          - os: macos-14
            label: macOS Intel
    runs-on: ${{ matrix.os }}
    name: 测试 (${{ matrix.label }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        run: npm install

      - name: 运行自动化测试
        run: npm test

  # ===== 第二步: 打包 macOS =====
  build:
    needs: test
    runs-on: macos-latest
    timeout-minutes: 30
    name: 打包 macOS (ARM64 + Intel)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        run: npm install

      - name: 创建空 bundled 目录（CI 不下载离线资源，安装时在线下载）
        run: mkdir -p bundled

      - name: 打包安装包
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30
