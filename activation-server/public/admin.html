<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反馈管理 - OpenClaw</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #0d0d1a; color: #e0e0e8; min-height: 100vh; }
.header { background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 1.1rem; color: #fff; }
.header a { color: #e94560; font-size: 0.85rem; }
.stats { padding: 16px 24px; display: flex; gap: 24px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.stat { font-size: 0.85rem; color: #888; }
.stat b { color: #f5c518; font-size: 1.1rem; }
.list { padding: 16px 24px; }
.item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 20px; margin-bottom: 12px; }
.item.new { border-left: 3px solid #e94560; }
.item.viewed { border-left: 3px solid #f5c518; }
.item.resolved { border-left: 3px solid #4ade80; opacity: 0.6; }
.item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.item-id { font-family: monospace; color: #888; font-size: 0.8rem; }
.item-time { font-size: 0.8rem; color: #666; }
.item-status { font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; }
.item-status.new { background: rgba(233,69,96,0.15); color: #e94560; }
.item-status.viewed { background: rgba(245,197,24,0.15); color: #f5c518; }
.item-status.resolved { background: rgba(74,222,128,0.15); color: #4ade80; }
.item-error { font-size: 0.9rem; color: #ef4444; margin-bottom: 8px; font-weight: 600; }
.item-sysinfo { font-size: 0.8rem; color: #888; margin-bottom: 12px; }
.item-sysinfo span { margin-right: 16px; }
.item-log { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 0.75rem; color: #a0a0b8; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
.item-actions { margin-top: 12px; display: flex; gap: 8px; }
.btn { padding: 6px 16px; border-radius: 6px; border: none; font-size: 0.8rem; cursor: pointer; font-family: inherit; }
.btn-view { background: rgba(245,197,24,0.15); color: #f5c518; }
.btn-resolve { background: rgba(74,222,128,0.15); color: #4ade80; }
.btn-detail { background: rgba(255,255,255,0.06); color: #e0e0e8; }
.empty { text-align: center; padding: 60px; color: #555; font-size: 0.95rem; }
.refresh { padding: 6px 16px; background: rgba(233,69,96,0.15); color: #e94560; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }

/* 登录遮罩 */
.login-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.login-box {
  background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 36px; width: 340px; text-align: center;
}
.login-box h2 { color: #fff; margin-bottom: 8px; font-size: 1.2rem; }
.login-box p { color: #888; font-size: 0.85rem; margin-bottom: 24px; }
.login-box input {
  width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  color: #fff; font-size: 1rem; outline: none; margin-bottom: 16px;
  font-family: inherit;
}
.login-box input:focus { border-color: #e94560; }
.login-box button {
  width: 100%; padding: 12px; background: linear-gradient(135deg, #e94560, #c23152);
  color: #fff; border: none; border-radius: 8px; font-size: 1rem;
  font-weight: 700; cursor: pointer; font-family: inherit;
}
.login-box .login-err { color: #ef4444; font-size: 0.85rem; margin-top: 12px; min-height: 20px; }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- 登录遮罩 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>管理员登录</h2>
    <p>请输入管理密码</p>
    <input type="password" id="loginPwd" placeholder="管理密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登录</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="header">
  <h1>OpenClaw 安装器反馈管理</h1>
  <div>
    <button class="refresh" onclick="loadFeedback()">刷新</button>
    <button class="btn btn-resolve" onclick="downloadCSV()" style="margin-left:8px;">下载领取记录CSV</button>
    <a href="/" style="margin-left:12px;">← 返回领取页</a>
  </div>
</div>
<div class="stats" id="stats"></div>
<div class="list" id="list"></div>

<script>
async function checkLogin() {
  try {
    const resp = await fetch('/api/feedback');
    if (resp.status === 401) return false;
    return true;
  } catch { return false; }
}

async function doLogin() {
  const pwd = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  try {
    const resp = await fetch('/api/feedback', {
      headers: { 'Authorization': 'Bearer ' + pwd }
    });
    if (resp.status === 401) {
      errEl.textContent = '密码错误';
      return;
    }
    // 登录成功，设 cookie
    document.cookie = 'admin_token=' + pwd + '; path=/; max-age=86400';
    document.getElementById('loginOverlay').classList.add('hidden');
    loadFeedback();
  } catch (e) {
    errEl.textContent = '网络错误';
  }
}

async function downloadCSV() {
  try {
    const resp = await fetch('/api/codes.csv');
    if (resp.status === 401) {
      alert('请先登录');
      return;
    }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'activation-codes.csv';
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('下载失败');
  }
}

async function loadFeedback() {
  try {
    const resp = await fetch('/api/feedback');
    if (resp.status === 401) {
      document.getElementById('loginOverlay').classList.remove('hidden');
      return;
    }
    const data = await resp.json();
    renderStats(data);
    renderList(data);
  } catch (e) {
    document.getElementById('list').innerHTML = '<div class="empty">加载失败</div>';
  }
}

function renderStats(data) {
  const newCount = data.filter(f => f.status === 'new').length;
  const viewedCount = data.filter(f => f.status === 'viewed').length;
  const resolvedCount = data.filter(f => f.status === 'resolved').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat">待处理 <b>${newCount}</b></div>
    <div class="stat">已查看 <b>${viewedCount}</b></div>
    <div class="stat">已解决 <b>${resolvedCount}</b></div>
    <div class="stat">总计 <b>${data.length}</b></div>
  `;
}

function renderList(data) {
  if (!data.length) {
    document.getElementById('list').innerHTML = '<div class="empty">暂无反馈</div>';
    return;
  }
  document.getElementById('list').innerHTML = data.map(f => {
    const si = f.systemInfo || {};
    const statusLabel = { new: '待处理', viewed: '已查看', resolved: '已解决' }[f.status] || f.status;
    return `
      <div class="item ${f.status}">
        <div class="item-header">
          <span class="item-id">#${f.id}</span>
          <span class="item-time">${new Date(f.createdAt).toLocaleString('zh-CN')}</span>
          <span class="item-status ${f.status}">${statusLabel}</span>
        </div>
        ${f.error ? `<div class="item-error">${escHtml(f.error)}</div>` : ''}
        ${f.contact ? `<div style="font-size:0.8rem;color:#f5c518;margin-bottom:8px;">联系: ${escHtml(f.contact)}</div>` : ''}
        <div class="item-sysinfo">
          <span>${si.os || '?'}</span>
          <span>${si.arch || '?'}</span>
          <span>${si.memory || '?'}</span>
          <span>安装器 v${si.installerVersion || '?'}</span>
          <span>Node ${si.nodeVersion || '?'}</span>
        </div>
        ${f.logTail ? `<details><summary style="cursor:pointer;color:#888;font-size:0.8rem;margin-bottom:8px;">查看日志</summary><div class="item-log">${escHtml(f.logTail)}</div></details>` : ''}
        <div class="item-actions">
          ${f.status === 'new' ? '<button class="btn btn-view" onclick="updateStatus(\'' + f.id + '\',\'viewed\')">标记已查看</button>' : ''}
          ${f.status !== 'resolved' ? '<button class="btn btn-resolve" onclick="updateStatus(\'' + f.id + '\',\'resolved\')">标记已解决</button>' : ''}
          ${f.status === 'resolved' ? '<button class="btn btn-view" onclick="updateStatus(\'' + f.id + '\',\'new\')">重新打开</button>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function updateStatus(id, status) {
  const resp = await fetch('/api/feedback');
  const data = await resp.json();
  const item = data.find(f => f.id === id);
  if (item) {
    item.status = status;
  }
  let marks = JSON.parse(localStorage.getItem('feedback-marks') || '{}');
  marks[id] = status;
  localStorage.setItem('feedback-marks', JSON.stringify(marks));
  loadFeedback();
}

// 页面加载时检查登录状态
checkLogin().then(loggedIn => {
  if (loggedIn) {
    document.getElementById('loginOverlay').classList.add('hidden');
    loadFeedback();
  }
});

// 覆盖渲染，应用本地标记
const origRender = renderList;
renderList = function(data) {
  const marks = JSON.parse(localStorage.getItem('feedback-marks') || '{}');
  data = data.map(f => ({ ...f, status: marks[f.id] || f.status }));
  origRender(data);
  renderStats(data);
};
</script>
</body>
</html>
