appId: com.openclaw.installer
productName: OpenClaw-Installer
copyright: Copyright 2026 OpenClaw

directories:
  output: dist
  buildResources: build

files:
  - main.js
  - preload.js
  - src/**/*
  - scripts/**/*
  - node_modules/**/*
  - build/icon.*

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico
  requestedExecutionLevel: asInvoker
portable:
  artifactName: OpenClaw-Portable.exe
nsis:
  oneClick: true
  perMachine: true
  deleteAppDataOnUninstall: false
  artifactName: openclaw-setup.exe

mac:
  target:
    - target: zip
      arch: [x64, arm64]
  icon: build/icon.png
  category: public.app-category.developer-tools
  hardenedRuntime: false
  identity: null

asar: true
asarUnpack:
  - scripts/**
  - node_modules/sudo-prompt/**

extraResources:
  - from: bundled
    to: bundled
    filter:
      - "**/*"
  - from: versions.json
    to: versions.json

forceCodeSigning: false
publish:
  provider: generic
  url: https://example.com/not-used
